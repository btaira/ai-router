# Provider routing config. Model IDs / reasoning params live here so a
# provider's flagship model can change without touching adapter code.
# API keys are read from environment variables (see .env.example), never
# stored here.
#
# NOTE ON MODEL NAMES: provider naming conventions change frequently.
# Verify model_id and the reasoning/thinking params against each
# provider's current docs before a production run; the values below are
# the working defaults for this deployment and are meant to be edited,
# not treated as ground truth.
#
# WEB SEARCH: every provider below has its native live-web-search tool
# enabled (`tools:`), so answers can cite current information instead of
# being limited to the model's training cutoff. Remove a provider's `tools`
# block to turn that off (it's billed per-search on top of normal tokens).
#
# OPENROUTER: deepseek, minimax, and moonshot are routed through OpenRouter
# (openrouter.ai) rather than hitting those vendors' APIs directly, using a
# single OPENROUTER_API_KEY. OpenRouter speaks the OpenAI chat-completions
# format (request_style: openai_chat) and normalizes reasoning effort across
# vendors via the `reasoning` field, and web search via the
# `openrouter:web_search` tool type. Model slugs use OpenRouter's
# "vendor/model-name" convention, which does not match the vendors' own
# native model names.
#
# MODELS / PRICING: `models:` is the selectable catalog shown in the UI's
# "Model settings" dropdown (4 tiers per vendor) — each entry's `pricing` is
# that specific model's list/base per-token rate (verified against
# provider/OpenRouter pricing pages; not accounting for prompt-caching
# discounts, which can cut effective cost 60-90% on repeat context, so treat
# these as a conservative upper bound). `model:` selects which catalog entry
# is active; changing it from the UI also happens to keep pricing correct
# automatically, since cost is looked up by matching `model` against this
# catalog, not stored separately. Re-verify prices periodically — they
# change often. A model string can still be set to something outside this
# catalog (e.g. via the API directly); in that case cost tracking falls back
# to $0/M until you add it here.
#
# SAMPLING: `temperature` / `top_p` are optional and omitted by default
# (each provider's own default applies — see `default_temperature` /
# `default_top_p` below, which are informational only and never sent in a
# request). Set an override from the UI's Model settings panel. Note some
# reasoning-mode configurations reject custom sampling params entirely (e.g.
# Anthropic requires temperature=1 while extended thinking is enabled) — if
# that happens the provider's own error message will explain why, surfaced
# per-provider without blocking the other five.
#
# LOCAL LLMs: local1/local2 (`local: true`) talk to a local OpenAI-compatible
# inference server — LM Studio by default — instead of a hosted vendor API.
# No API key needed (the running server doesn't check it); `model:` is
# whatever's currently loaded in LM Studio, picked from a dropdown fetched
# live via GET /api/config/providers/{key}/local-models (not a static
# `models:` catalog — a local server's available models change too often for
# that). Both point at the same LM Studio instance/port by default so you can
# run two different locally-loaded models as two independent stage-1
# participants; base_url uses `host.docker.internal`, Docker Desktop's DNS
# name for reaching the host machine from inside the container — change it
# to `localhost` if running the app directly (Option B in the README) rather
# than via Docker, or to another machine's IP if LM Studio runs elsewhere on
# your network. Pricing is $0/M — local inference has no per-token cost.
# `model: "not-configured"` is a sentinel — providers/base.py refuses to run
# a local provider still set to it (clear error instead of silently sending
# that literal string as the model), so pick a real one from the live
# dropdown and Save before enabling. If both slots share one LM Studio
# instance, requests to it are also serialized (see stage1_dispatch.py) —
# a local server actively serves one model at a time, so two concurrent
# requests asking for two different models would otherwise race and both
# risk answering with whichever model happened to be loaded at that moment.

providers:
  anthropic:
    enabled: false
    display_name: "Anthropic"
    base_url: "https://api.anthropic.com/v1/messages"
    api_key_env: "ANTHROPIC_API_KEY"
    model: "claude-sonnet-5"
    max_tokens: 8192
    thinking:
      type: "adaptive"
    output_config:
      effort: "high"
    tools:
      - type: "web_search_20250305"
        name: "web_search"
        max_uses: 5
    request_style: anthropic
    default_temperature: 1.0
    default_top_p: null   # unset — Anthropic doesn't document a fixed default; model-determined
    sampling_locked: true   # extended thinking is always on above; Anthropic requires temperature=1 (and top_p unset) while it's enabled
    models:
      - id: "claude-opus-4-8"
        pricing: {input_per_million: 5.00, output_per_million: 25.00}
      - id: "claude-sonnet-5"
        # Introductory pricing through 2026-08-31; standard $3/$15 after.
        pricing: {input_per_million: 2.00, output_per_million: 10.00}
      - id: "claude-haiku-4-5"
        pricing: {input_per_million: 1.00, output_per_million: 5.00}
      - id: "claude-opus-4-7"
        pricing: {input_per_million: 5.00, output_per_million: 25.00}
      - id: "claude-fable-5"
        # Anthropic's newest top-tier flagship (GA since 2026-06-09), above Opus 4.8.
        pricing: {input_per_million: 10.00, output_per_million: 50.00}

  openai:
    enabled: false
    display_name: "OpenAI"
    base_url: "https://api.openai.com/v1/responses"
    api_key_env: "OPENAI_API_KEY"
    model: "gpt-5.6-terra"
    reasoning:
      effort: "xhigh"
    tools:
      - type: "web_search"
    max_output_tokens: 8192
    request_style: openai_responses
    default_temperature: 1.0
    default_top_p: 1.0
    sampling_locked: true   # reasoning-effort models reject a custom temperature/top_p (fixed at 1), same pattern as OpenAI's o-series
    models:
      - id: "gpt-5.6-sol"
        pricing: {input_per_million: 5.00, output_per_million: 30.00}
      - id: "gpt-5.6-terra"
        pricing: {input_per_million: 2.50, output_per_million: 15.00}
      - id: "gpt-5.6-luna"
        pricing: {input_per_million: 1.00, output_per_million: 6.00}
      - id: "gpt-5.5"
        pricing: {input_per_million: 5.00, output_per_million: 30.00}
      - id: "gpt-5.4-mini"
        # Different generation/size class than the gpt-5.6/5.5 models above — good buffer pick.
        pricing: {input_per_million: 0.75, output_per_million: 4.50}

  google:
    enabled: false
    display_name: "Google Gemini"
    base_url: "https://generativelanguage.googleapis.com/v1beta/models"
    api_key_env: "GOOGLE_API_KEY"
    model: "gemini-3.1-pro-preview"
    thinking_level: "high"
    tools:
      - google_search: {}
    max_output_tokens: 8192
    request_style: google_native
    default_temperature: 1.0
    default_top_p: 0.95
    models:
      - id: "gemini-3.1-pro-preview"
        # Rate for prompts under 200K tokens; input/output double to $4/$18
        # above that threshold (we don't track this tier switch).
        pricing: {input_per_million: 2.00, output_per_million: 12.00}
      - id: "gemini-3.5-flash"
        pricing: {input_per_million: 1.50, output_per_million: 9.00}
      - id: "gemini-3.1-flash-lite"
        pricing: {input_per_million: 0.25, output_per_million: 1.50}
      - id: "gemini-3-flash-preview"
        # No shutdown date announced (as of 2026-07). Older preview tier that
        # gemini-3.5-flash eventually supersedes, but currently stable — kept
        # as a 4th working option since gemini-2.5-pro (below) is deprecated.
        pricing: {input_per_million: 0.50, output_per_million: 3.00}
      - id: "gemini-2.5-pro"
        pricing: {input_per_million: 1.25, output_per_million: 10.00}
        status: "deprecated"   # shuts down 2026-10-16; use gemini-3.1-pro-preview instead (Google's own recommendation)

  # --- Routed through OpenRouter (openrouter.ai) — see note above. ---

  deepseek:
    enabled: true
    display_name: "DeepSeek · OpenRouter"
    base_url: "https://openrouter.ai/api/v1/chat/completions"
    api_key_env: "OPENROUTER_API_KEY"
    model: "z-ai/glm-5.2"
    reasoning:
      effort: "xhigh"
    tools:
      - type: "openrouter:web_search"
    max_tokens: 8192
    request_style: openai_chat
    default_temperature: 1.0
    default_top_p: 1.0
    models:
      - id: "deepseek/deepseek-v4-pro"
        pricing: {input_per_million: 0.435, output_per_million: 0.87}
      - id: "deepseek/deepseek-v4-flash"
        pricing: {input_per_million: 0.09, output_per_million: 0.18}
      - id: "deepseek/deepseek-r1"
        pricing: {input_per_million: 0.70, output_per_million: 2.50}
      - id: "deepseek/deepseek-v3.2"
        pricing: {input_per_million: 0.269, output_per_million: 0.40}
      - id: "deepseek/deepseek-r1-0528"
        # Newer point release of R1 — cheaper than the base r1 entry above.
        pricing: {input_per_million: 0.50, output_per_million: 2.15}
      # --- Top OpenRouter models (not vendor-specific) — see the shared
      # note under "minimax:" below for what this block is and how it was
      # picked. ---
      - id: "tencent/hy3:free"
        pricing: {input_per_million: 0.00, output_per_million: 0.00}
      - id: "xiaomi/mimo-v2.5"
        pricing: {input_per_million: 0.14, output_per_million: 0.28}
      - id: "z-ai/glm-5.2"
        pricing: {input_per_million: 0.959, output_per_million: 3.014}
      - id: "nvidia/nemotron-3-ultra-550b-a55b:free"
        pricing: {input_per_million: 0.00, output_per_million: 0.00}
      - id: "stepfun/step-3.7-flash"
        pricing: {input_per_million: 0.20, output_per_million: 1.15}
      - id: "poolside/laguna-m.1:free"
        pricing: {input_per_million: 0.00, output_per_million: 0.00}
      - id: "xiaomi/mimo-v2.5-pro"
        pricing: {input_per_million: 0.435, output_per_million: 0.87}
      - id: "x-ai/grok-4.5"
        pricing: {input_per_million: 2.00, output_per_million: 6.00}
      - id: "mistralai/mistral-nemo"
        pricing: {input_per_million: 0.019, output_per_million: 0.03}

  minimax:
    enabled: true
    display_name: "MiniMax · OpenRouter"
    base_url: "https://openrouter.ai/api/v1/chat/completions"
    api_key_env: "OPENROUTER_API_KEY"
    model: "xiaomi/mimo-v2.5"
    reasoning:
      effort: "xhigh"
    tools:
      - type: "openrouter:web_search"
    max_tokens: 8192
    request_style: openai_chat
    default_temperature: 1.0
    default_top_p: 1.0
    models:
      - id: "minimax/minimax-m2.7"
        pricing: {input_per_million: 0.24, output_per_million: 0.96}
      - id: "minimax/minimax-m2"
        pricing: {input_per_million: 0.255, output_per_million: 1.02}
      - id: "minimax/minimax-m3"
        pricing: {input_per_million: 0.30, output_per_million: 1.20}
      - id: "minimax/minimax-m1"
        pricing: {input_per_million: 0.40, output_per_million: 2.20}
      - id: "minimax/minimax-m2.5"
        pricing: {input_per_million: 0.15, output_per_million: 0.90}
      # --- Top OpenRouter models (not vendor-specific). DeepSeek, MiniMax,
      # and Moonshot all route through the same OPENROUTER_API_KEY (see the
      # note at the top of this file), so — unlike Anthropic/OpenAI/Google,
      # which each only offer their own vendor's models — these three slots
      # can each be pointed at *any* OpenRouter-hosted model, not just one
      # from their namesake vendor. This shared block is the top 15 models
      # on OpenRouter's LLM Leaderboard by weekly usage
      # (openrouter.ai/rankings#leaderboard-table, checked 2026-07-20),
      # excluding anything from Anthropic/OpenAI/Google (pick those from
      # their own native slot instead — better feature support) and
      # anything already covered by this provider's own vendor-specific
      # entries above (so e.g. deepseek/deepseek-v4-pro doesn't appear
      # twice in DeepSeek's own dropdown) — which is why this list is 9
      # entries, not 15: the other 6 of the top 15 are already present
      # somewhere in the three vendor-specific lists in this file. Pricing
      # verified the same day via OpenRouter's public /api/v1/models
      # endpoint. ---
      - id: "tencent/hy3:free"
        pricing: {input_per_million: 0.00, output_per_million: 0.00}
      - id: "xiaomi/mimo-v2.5"
        pricing: {input_per_million: 0.14, output_per_million: 0.28}
      - id: "z-ai/glm-5.2"
        pricing: {input_per_million: 0.959, output_per_million: 3.014}
      - id: "nvidia/nemotron-3-ultra-550b-a55b:free"
        pricing: {input_per_million: 0.00, output_per_million: 0.00}
      - id: "stepfun/step-3.7-flash"
        pricing: {input_per_million: 0.20, output_per_million: 1.15}
      - id: "poolside/laguna-m.1:free"
        pricing: {input_per_million: 0.00, output_per_million: 0.00}
      - id: "xiaomi/mimo-v2.5-pro"
        pricing: {input_per_million: 0.435, output_per_million: 0.87}
      - id: "x-ai/grok-4.5"
        pricing: {input_per_million: 2.00, output_per_million: 6.00}
      - id: "mistralai/mistral-nemo"
        pricing: {input_per_million: 0.019, output_per_million: 0.03}

  moonshot:
    enabled: true
    display_name: "Moonshot (Kimi) · OpenRouter"
    base_url: "https://openrouter.ai/api/v1/chat/completions"
    api_key_env: "OPENROUTER_API_KEY"
    model: "x-ai/grok-4.5"
    reasoning:
      effort: "xhigh"
    tools:
      - type: "openrouter:web_search"
    max_tokens: 8192
    request_style: openai_chat
    default_temperature: 1.0
    default_top_p: 1.0
    models:
      - id: "moonshotai/kimi-k2-thinking"
        pricing: {input_per_million: 0.60, output_per_million: 2.50}
      - id: "moonshotai/kimi-k2.6"
        pricing: {input_per_million: 0.66, output_per_million: 3.41}
      - id: "moonshotai/kimi-k2.7-code"
        pricing: {input_per_million: 0.719, output_per_million: 3.49}
      - id: "moonshotai/kimi-k2"
        pricing: {input_per_million: 0.57, output_per_million: 2.30}
      - id: "moonshotai/kimi-k2-0905"
        pricing: {input_per_million: 0.60, output_per_million: 2.50}
      - id: "moonshotai/kimi-k3"
        # Released since our last catalog refresh — MODELS_STATUS.md had it
        # listed as "rumored, not released"; it's out now. Notably pricier
        # than the rest of this lineup; not made the default, but ranked #3
        # on OpenRouter's Artificial Analysis Intelligence Index as of
        # 2026-07-20, so worth having available.
        pricing: {input_per_million: 3.00, output_per_million: 15.00}
      # --- Top OpenRouter models (not vendor-specific) — see the shared
      # note under "minimax:" above for what this block is and how it was
      # picked. ---
      - id: "tencent/hy3:free"
        pricing: {input_per_million: 0.00, output_per_million: 0.00}
      - id: "xiaomi/mimo-v2.5"
        pricing: {input_per_million: 0.14, output_per_million: 0.28}
      - id: "z-ai/glm-5.2"
        pricing: {input_per_million: 0.959, output_per_million: 3.014}
      - id: "nvidia/nemotron-3-ultra-550b-a55b:free"
        pricing: {input_per_million: 0.00, output_per_million: 0.00}
      - id: "stepfun/step-3.7-flash"
        pricing: {input_per_million: 0.20, output_per_million: 1.15}
      - id: "poolside/laguna-m.1:free"
        pricing: {input_per_million: 0.00, output_per_million: 0.00}
      - id: "xiaomi/mimo-v2.5-pro"
        pricing: {input_per_million: 0.435, output_per_million: 0.87}
      - id: "x-ai/grok-4.5"
        pricing: {input_per_million: 2.00, output_per_million: 6.00}
      - id: "mistralai/mistral-nemo"
        pricing: {input_per_million: 0.019, output_per_million: 0.03}

  # --- Local inference (LM Studio) — see the "LOCAL LLMs" note above. ---

  local1:
    enabled: true
    display_name: "Local LLM 1 (LM Studio)"
    base_url: "http://host.docker.internal:1234/v1/chat/completions"
    api_key_env: "LMSTUDIO_API_KEY"
    model: "deepseek/deepseek-r1-0528-qwen3-8b"
    max_tokens: 4096
    request_style: openai_chat
    default_temperature: 1.0
    default_top_p: 1.0
    local: true

  local2:
    enabled: true
    display_name: "Local LLM 2 (LM Studio)"
    base_url: "http://host.docker.internal:1234/v1/chat/completions"
    api_key_env: "LMSTUDIO_API_KEY"
    model: "meta/llama-3.3-70b"
    max_tokens: 4096
    request_style: openai_chat
    default_temperature: 1.0
    default_top_p: 1.0
    local: true

pipeline:
  stage1:
    timeout_seconds: 180

  stage2:
    enabled: true
    mode: "designated_fact_checkers"   # designated_fact_checkers | full_mesh | diff_then_check
    fact_checkers:
      - anthropic
      - openai
    timeout_seconds: 180

  stage3:
    synthesis_provider: anthropic
    timeout_seconds: 180

  citations:
    timeout_seconds: 10
    retries: 1
    user_agent: "ai-router-citation-checker/1.0"
