# Provider routing config. Model IDs / reasoning params live here so a
# provider's flagship model can change without touching adapter code.
# API keys are read from environment variables (see .env.example), never
# stored here.
#
# NOTE ON MODEL NAMES: provider naming conventions change frequently.
# Verify model_id and the reasoning/thinking params against each
# provider's current docs before a production run; the values below are
# the working defaults for this deployment and are meant to be edited,
# not treated as ground truth.
#
# WEB SEARCH: every provider below has its native live-web-search tool
# enabled (`tools:`), so answers can cite current information instead of
# being limited to the model's training cutoff. Remove a provider's `tools`
# block to turn that off (it's billed per-search on top of normal tokens).
#
# OPENROUTER: deepseek, minimax, and moonshot are routed through OpenRouter
# (openrouter.ai) rather than hitting those vendors' APIs directly, using a
# single OPENROUTER_API_KEY. OpenRouter speaks the OpenAI chat-completions
# format (request_style: openai_chat) and normalizes reasoning effort across
# vendors via the `reasoning` field, and web search via the
# `openrouter:web_search` tool type. Model slugs use OpenRouter's
# "vendor/model-name" convention, which does not match the vendors' own
# native model names.
#
# MODELS / PRICING: `models:` is the selectable catalog shown in the UI's
# "Model settings" dropdown (4 tiers per vendor) — each entry's `pricing` is
# that specific model's list/base per-token rate (verified against
# provider/OpenRouter pricing pages; not accounting for prompt-caching
# discounts, which can cut effective cost 60-90% on repeat context, so treat
# these as a conservative upper bound). `model:` selects which catalog entry
# is active; changing it from the UI also happens to keep pricing correct
# automatically, since cost is looked up by matching `model` against this
# catalog, not stored separately. Re-verify prices periodically — they
# change often. A model string can still be set to something outside this
# catalog (e.g. via the API directly); in that case cost tracking falls back
# to $0/M until you add it here.
#
# SAMPLING: `temperature` / `top_p` are optional and omitted by default
# (each provider's own default applies — see `default_temperature` /
# `default_top_p` below, which are informational only and never sent in a
# request). Set an override from the UI's Model settings panel. Note some
# reasoning-mode configurations reject custom sampling params entirely (e.g.
# Anthropic requires temperature=1 while extended thinking is enabled) — if
# that happens the provider's own error message will explain why, surfaced
# per-provider without blocking the other five.

providers:
  anthropic:
    enabled: true
    display_name: "Anthropic"
    base_url: "https://api.anthropic.com/v1/messages"
    api_key_env: "ANTHROPIC_API_KEY"
    model: "claude-sonnet-5"
    max_tokens: 8192
    thinking:
      type: "adaptive"
    output_config:
      effort: "high"
    tools:
      - type: "web_search_20250305"
        name: "web_search"
        max_uses: 5
    request_style: anthropic
    default_temperature: 1.0
    default_top_p: null   # unset — Anthropic doesn't document a fixed default; model-determined
    models:
      - id: "claude-opus-4-8"
        pricing: {input_per_million: 5.00, output_per_million: 25.00}
      - id: "claude-sonnet-5"
        # Introductory pricing through 2026-08-31; standard $3/$15 after.
        pricing: {input_per_million: 2.00, output_per_million: 10.00}
      - id: "claude-haiku-4-5"
        pricing: {input_per_million: 1.00, output_per_million: 5.00}
      - id: "claude-opus-4-7"
        pricing: {input_per_million: 5.00, output_per_million: 25.00}

  openai:
    enabled: false
    display_name: "OpenAI"
    base_url: "https://api.openai.com/v1/responses"
    api_key_env: "OPENAI_API_KEY"
    model: "gpt-5.6-sol"
    reasoning:
      effort: "xhigh"
    tools:
      - type: "web_search"
    max_output_tokens: 8192
    request_style: openai_responses
    default_temperature: 1.0
    default_top_p: 1.0
    models:
      - id: "gpt-5.6-sol"
        pricing: {input_per_million: 5.00, output_per_million: 30.00}
      - id: "gpt-5.6-terra"
        pricing: {input_per_million: 2.50, output_per_million: 15.00}
      - id: "gpt-5.6-luna"
        pricing: {input_per_million: 1.00, output_per_million: 6.00}
      - id: "gpt-5.5"
        pricing: {input_per_million: 5.00, output_per_million: 30.00}

  google:
    enabled: false
    display_name: "Google Gemini"
    base_url: "https://generativelanguage.googleapis.com/v1beta/models"
    api_key_env: "GOOGLE_API_KEY"
    model: "gemini-3.1-pro-preview"
    thinking_level: "high"
    tools:
      - google_search: {}
    max_output_tokens: 8192
    request_style: google_native
    default_temperature: 1.0
    default_top_p: 0.95
    models:
      - id: "gemini-3.1-pro-preview"
        # Rate for prompts under 200K tokens; input/output double to $4/$18
        # above that threshold (we don't track this tier switch).
        pricing: {input_per_million: 2.00, output_per_million: 12.00}
      - id: "gemini-3.5-flash"
        pricing: {input_per_million: 1.50, output_per_million: 9.00}
      - id: "gemini-3.1-flash-lite"
        pricing: {input_per_million: 0.25, output_per_million: 1.50}
      - id: "gemini-2.5-pro"
        pricing: {input_per_million: 1.25, output_per_million: 10.00}

  # --- Routed through OpenRouter (openrouter.ai) — see note above. ---

  deepseek:
    enabled: false
    display_name: "DeepSeek"
    base_url: "https://openrouter.ai/api/v1/chat/completions"
    api_key_env: "OPENROUTER_API_KEY"
    model: "deepseek/deepseek-v4-pro"
    reasoning:
      effort: "xhigh"
    tools:
      - type: "openrouter:web_search"
    max_tokens: 8192
    request_style: openai_chat
    default_temperature: 1.0
    default_top_p: 1.0
    models:
      - id: "deepseek/deepseek-v4-pro"
        pricing: {input_per_million: 0.435, output_per_million: 0.87}
      - id: "deepseek/deepseek-v4-flash"
        pricing: {input_per_million: 0.09, output_per_million: 0.18}
      - id: "deepseek/deepseek-r1"
        pricing: {input_per_million: 0.70, output_per_million: 2.50}
      - id: "deepseek/deepseek-v3.2"
        pricing: {input_per_million: 0.2145, output_per_million: 0.3218}

  minimax:
    enabled: false
    display_name: "MiniMax"
    base_url: "https://openrouter.ai/api/v1/chat/completions"
    api_key_env: "OPENROUTER_API_KEY"
    model: "minimax/minimax-m2.7"
    reasoning:
      effort: "xhigh"
    tools:
      - type: "openrouter:web_search"
    max_tokens: 8192
    request_style: openai_chat
    default_temperature: 1.0
    default_top_p: 1.0
    models:
      - id: "minimax/minimax-m2.7"
        pricing: {input_per_million: 0.24, output_per_million: 0.96}
      - id: "minimax/minimax-m2"
        pricing: {input_per_million: 0.255, output_per_million: 1.02}
      - id: "minimax/minimax-m3"
        pricing: {input_per_million: 0.30, output_per_million: 1.20}
      - id: "minimax/minimax-m1"
        pricing: {input_per_million: 0.40, output_per_million: 2.20}

  moonshot:
    enabled: false
    display_name: "Moonshot (Kimi)"
    base_url: "https://openrouter.ai/api/v1/chat/completions"
    api_key_env: "OPENROUTER_API_KEY"
    model: "moonshotai/kimi-k2-thinking"
    reasoning:
      effort: "xhigh"
    tools:
      - type: "openrouter:web_search"
    max_tokens: 8192
    request_style: openai_chat
    default_temperature: 1.0
    default_top_p: 1.0
    models:
      - id: "moonshotai/kimi-k2-thinking"
        pricing: {input_per_million: 0.60, output_per_million: 2.50}
      - id: "moonshotai/kimi-k2.6"
        pricing: {input_per_million: 0.66, output_per_million: 3.41}
      - id: "moonshotai/kimi-k2.7-code"
        pricing: {input_per_million: 0.719, output_per_million: 3.49}
      - id: "moonshotai/kimi-k2"
        pricing: {input_per_million: 0.57, output_per_million: 2.30}

pipeline:
  stage1:
    timeout_seconds: 180

  stage2:
    enabled: true
    mode: "designated_fact_checkers"   # designated_fact_checkers | full_mesh | diff_then_check
    fact_checkers:
      - anthropic
      - openai
    timeout_seconds: 180

  stage3:
    synthesis_provider: anthropic
    timeout_seconds: 180

  citations:
    timeout_seconds: 10
    retries: 1
    user_agent: "ai-router-citation-checker/1.0"
